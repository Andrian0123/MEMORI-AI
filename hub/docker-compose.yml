version: '3.8'
services:
  hub-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://smeta:smeta_secret@postgres:5432/smeta_hub
    volumes:
      - ./models:/app/models
  postgres:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_USER=smeta
      - POSTGRES_PASSWORD=smeta_secret
      - POSTGRES_DB=smeta_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=smeta_access
      - MINIO_ROOT_PASSWORD=smeta_secret_key
    command: server /data --console-address ":9001"
volumes:
  postgres_data:
