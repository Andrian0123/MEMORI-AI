#date: 2026-06-23
#version: 1.0.0
#see: https://github.com/engram-memory/engram

version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: engram_hub
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://engram:${POSTGRES_PASSWORD}@postgres:5432/engram_hub
      MINIO_URL: http://minio:9000
      MODEL_PATH: /models
    volumes:
      - ./models:/models

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ./models/ollama:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0